<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="utf-8" />
  <link rel="icon" href="/favicon.ico" />
  <link rel="apple-touch-icon" href="/pwa-192x192.png">
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <meta name="theme-color" content="#a67c52" />
  <title>鑫蘴家</title>

  <link
    href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@300;400;500;700;900&family=Noto+Serif+TC:wght@400;500;600;700&display=swap"
    rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap"
    rel="stylesheet" />
  <style>
    body {
      margin: 0;
      font-family: 'Noto Sans TC', sans-serif;
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
    }

    .loading-flow {
      color: rgba(255, 255, 255, 0.55);
      background: linear-gradient(90deg, rgba(255, 255, 255, 0.15), rgba(255, 255, 255, 0.85), rgba(255, 255, 255, 0.15));
      background-size: 200% 100%;
      animation: loading-flow 1.6s ease-in-out infinite;
    }

    @supports (-webkit-background-clip: text) or (background-clip: text) {
      .loading-flow {
        -webkit-background-clip: text;
        background-clip: text;
        color: transparent;
        -webkit-text-fill-color: transparent;
      }
    }

    @media (prefers-reduced-motion: reduce) {
      .loading-flow {
        animation: none;
      }
    }

    @keyframes loading-flow {
      0% {
        background-position: 0% 50%;
      }

      100% {
        background-position: 200% 50%;
      }
    }

    /* Hide scrollbar for Chrome, Safari and Opera */
    .no-scrollbar::-webkit-scrollbar {
      display: none;
    }

    /* Hide scrollbar for IE, Edge and Firefox */
    .no-scrollbar {
      -ms-overflow-style: none;
      /* IE and Edge */
      scrollbar-width: none;
      /* Firefox */
    }
  </style>
  <script type="importmap">

}
</script>

</head>

    <div class="flex min-h-screen flex-col items-center justify-center bg-[#181411] text-white font-sans">
      <div class="relative flex flex-col items-center">
        <div class="loading-flow text-xl font-light tracking-[0.2em] uppercase">LOADING.....</div>
      </div>
    </div>
  </div>
  <script type="module" src="/index.tsx"></script>
</body>

</html>
