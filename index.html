<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="utf-8" />
  <link rel="icon" href="/favicon.ico" />
  <link rel="apple-touch-icon" href="/pwa-192x192.png">
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <meta name="theme-color" content="#a67c52" />
  <title>鑫蘴家</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link
    href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@300;400;500;700;900&family=Noto+Serif+TC:wght@400;500;600;700&display=swap"
    rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap"
    rel="stylesheet" />
  <script>
    tailwind.config = {
      darkMode: 'class',
      theme: {
        extend: {
          colors: {
            gold: '#d4af37',
            'gold-light': '#f2d675',
            'admin-primary': '#f27f0d',
            'admin-bg': '#f8f7f5',
            'admin-dark': '#221910',
            'luxury-dark': '#121212',
            'luxury-card': '#1e1e1e',
          },
          fontFamily: {
            sans: ['Noto Sans TC', 'sans-serif'],
            display: ['Noto Serif TC', 'Noto Sans TC', 'serif'],
          },
          keyframes: {
            fadeIn: {
              '0%': { opacity: '0' },
              '100%': { opacity: '1' },
            },
            fadeInUp: {
              '0%': {
                opacity: '0',
                transform: 'translateY(20px)',
              },
              '100%': {
                opacity: '1',
                transform: 'translateY(0)',
              },
            },
            zoomIn: {
              '0%': {
                opacity: '0',
                transform: 'scale(0.95)',
              },
              '100%': {
                opacity: '1',
                transform: 'scale(1)',
              },
            },
            scaleDown: {
              '0%': {
                opacity: '0',
                transform: 'scale(1.1)',
                filter: 'blur(5px)',
              },
              '20%': {
                opacity: '1',
                filter: 'blur(0px)',
              },
              '100%': {
                opacity: '1',
                transform: 'scale(1)',
                filter: 'blur(0px)',
              },
            },
            shimmer: {
              '0%': { backgroundPosition: '-1000px 0' },
              '100%': { backgroundPosition: '1000px 0' },
            }
          },
          animation: {
            'fade-in': 'fadeIn 0.5s ease-out forwards',
            'fade-in-up': 'fadeInUp 0.7s ease-out forwards',
            'zoom-in': 'zoomIn 0.5s ease-out forwards',
            'scale-down': 'scaleDown 1.5s ease-out forwards',
            'shimmer': 'shimmer 2s infinite linear',
          },
        },
      },
    }
  </script>
  <style>
    body {
      margin: 0;
      font-family: 'Noto Sans TC', sans-serif;
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
    }

    .loading-flow {
      color: rgba(255, 255, 255, 0.55);
      background: linear-gradient(90deg, rgba(255, 255, 255, 0.15), rgba(255, 255, 255, 0.85), rgba(255, 255, 255, 0.15));
      background-size: 200% 100%;
      animation: loading-flow 1.6s ease-in-out infinite;
    }

    @supports (-webkit-background-clip: text) or (background-clip: text) {
      .loading-flow {
        -webkit-background-clip: text;
        background-clip: text;
        color: transparent;
        -webkit-text-fill-color: transparent;
      }
    }

    @media (prefers-reduced-motion: reduce) {
      .loading-flow {
        animation: none;
      }
    }

    @keyframes loading-flow {
      0% {
        background-position: 0% 50%;
      }

      100% {
        background-position: 200% 50%;
      }
    }

    /* Hide scrollbar for Chrome, Safari and Opera */
    .no-scrollbar::-webkit-scrollbar {
      display: none;
    }

    /* Hide scrollbar for IE, Edge and Firefox */
    .no-scrollbar {
      -ms-overflow-style: none;
      /* IE and Edge */
      scrollbar-width: none;
      /* Firefox */
    }
  </style>
  <script type="importmap">
{
  "imports": {
    "react/": "https://esm.sh/react@^19.2.3/",
    "react": "https://esm.sh/react@^19.2.3",
    "react-dom/": "https://esm.sh/react-dom@^19.2.3/",
    "lucide-react": "https://esm.sh/lucide-react@^0.562.0",
    "react-router-dom": "https://esm.sh/react-router-dom@^7.12.0"
  }
}
</script>

</head>

<body>
  <div id="root">
    <div class="flex min-h-screen flex-col items-center justify-center bg-[#181411] text-white font-sans">
      <div class="relative flex flex-col items-center">
        <div class="loading-flow text-xl font-light tracking-[0.2em] uppercase">LOADING.....</div>
      </div>
    </div>
  </div>
  <script type="module" src="/index.tsx"></script>
</body>

</html>
